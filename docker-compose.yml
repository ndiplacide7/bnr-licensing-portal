services:
  postgres:
    image: postgres:16-alpine
    container_name: bnr-postgres
    environment:
      POSTGRES_DB: bnr_portal
      POSTGRES_USER: bnr_user
      POSTGRES_PASSWORD: bnr_pwd
    ports:
      - "5432:5432"
    volumes:
      - bnr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bnr_user -d bnr_portal"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  bnr_postgres_data:
